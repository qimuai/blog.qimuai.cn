name: Deploy

permissions:
  contents: read
  discussions: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: blog-qimuai-cn-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy blog.qimuai.cn
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.17.1

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync article discussions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-discussions.mjs

      - name: Build site
        run: pnpm run build

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.BLOG_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.BLOG_DEPLOY_PORT }}" -H "${{ secrets.BLOG_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync dist to server
        shell: bash
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.BLOG_DEPLOY_PORT }}" \
            dist/ \
            "${{ secrets.BLOG_DEPLOY_USER }}@${{ secrets.BLOG_DEPLOY_HOST }}:${{ secrets.BLOG_DEPLOY_PATH }}"

      - name: Sync admin app on server
        shell: bash
        run: |
          ssh -p "${{ secrets.BLOG_DEPLOY_PORT }}" \
            "${{ secrets.BLOG_DEPLOY_USER }}@${{ secrets.BLOG_DEPLOY_HOST }}" \
            'set -e
            cd /opt/blog-admin/repo
            git pull --ff-only origin main
            sudo systemctl restart blog-admin.service
            curl -fsS http://127.0.0.1:4321/health'

      - name: Verify deployed site
        shell: bash
        run: |
          curl -I --max-redirs 3 https://blog.qimuai.cn/ | sed -n "1,12p"
          curl -I --max-redirs 3 https://blog.qimuai.cn/posts/news-214/ | sed -n "1,12p"
