<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文章预览 | Qimuai Blog 后台</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --panel: #ffffff;
        --border: #d8e0ec;
        --text: #162033;
        --muted: #617089;
        --accent: #2160ff;
        --shadow: 0 24px 60px rgba(18, 34, 74, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(180deg, #f7f9fc 0%, #eef3f9 100%);
        color: var(--text);
        font-family:
          "SF Pro Text",
          "PingFang SC",
          "Hiragino Sans GB",
          "Noto Sans CJK SC",
          sans-serif;
      }

      .shell {
        width: min(78rem, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0 4rem;
      }

      .toolbar,
      .article {
        border: 1px solid var(--border);
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.25rem;
        padding: 1rem 1.2rem;
      }

      .toolbar-copy {
        display: grid;
        gap: 0.2rem;
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 0.75rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .toolbar h1 {
        margin: 0;
        font-size: 1.15rem;
      }

      .toolbar p {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .toolbar-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 0 1rem;
        font-size: 0.92rem;
        font-weight: 600;
        text-decoration: none;
      }

      .button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .button[hidden] {
        display: none;
      }

      .article {
        padding: 2rem 2.25rem;
      }

      .hero {
        padding-bottom: 1.25rem;
        border-bottom: 1px solid rgba(33, 96, 255, 0.12);
      }

      .hero h2 {
        margin: 0.45rem 0 0.8rem;
        font-size: clamp(2rem, 4vw, 3.6rem);
        line-height: 1.08;
      }

      .meta,
      .description,
      .draft-note {
        margin: 0;
        color: var(--muted);
      }

      .meta {
        font-size: 0.98rem;
      }

      .description {
        margin-top: 0.9rem;
        font-size: 1rem;
        line-height: 1.8;
        color: var(--text);
      }

      .draft-note {
        margin-top: 0.8rem;
        font-size: 0.92rem;
      }

      .content {
        padding-top: 1.5rem;
      }

      .content h1,
      .content h2,
      .content h3,
      .content h4,
      .content h5,
      .content h6 {
        margin: 1.5em 0 0.55em;
        line-height: 1.25;
      }

      .content p,
      .content li,
      .content blockquote {
        font-size: 1rem;
        line-height: 1.9;
      }

      .content p,
      .content ul,
      .content ol,
      .content pre,
      .content blockquote,
      .content hr {
        margin: 0 0 1rem;
      }

      .content ul,
      .content ol {
        padding-left: 1.35rem;
      }

      .content a {
        color: var(--accent);
        text-decoration: underline;
        text-underline-offset: 0.18em;
      }

      .content code {
        border-radius: 0.45rem;
        background: rgba(33, 96, 255, 0.08);
        padding: 0.15rem 0.4rem;
        font-family:
          "Google Sans Code",
          "SFMono-Regular",
          "SF Mono",
          ui-monospace,
          monospace;
        font-size: 0.92em;
      }

      .content pre {
        overflow: auto;
        border-radius: 0.9rem;
        background: #0f172a;
        color: #e5eefc;
        padding: 1rem 1.1rem;
      }

      .content pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .content blockquote {
        border-left: 3px solid rgba(33, 96, 255, 0.28);
        margin-left: 0;
        padding-left: 1rem;
        color: #33435f;
      }

      .content hr {
        border: 0;
        border-top: 1px solid rgba(33, 96, 255, 0.12);
      }

      .empty {
        display: grid;
        place-items: center;
        min-height: 50vh;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .shell {
          width: min(100%, calc(100% - 1rem));
          padding-top: 1rem;
        }

        .toolbar,
        .article {
          padding: 1rem;
        }

        .hero h2 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="empty-state" class="empty" hidden>
      <div>
        <p class="eyebrow">Qimuai Blog</p>
        <h1>这份预览已经过期</h1>
        <p>回到后台重新点击一次“新窗口预览”，就能拿到最新内容。</p>
      </div>
    </div>

    <div id="preview-shell" class="shell" hidden>
      <section class="toolbar">
        <div class="toolbar-copy">
          <p class="eyebrow">后台预览</p>
          <h1 id="toolbar-title">文章预览</h1>
          <p id="toolbar-meta">这不是公开页面，仅供保存前确认排版。</p>
        </div>
        <div class="toolbar-actions">
          <a id="public-link" class="button" href="#" target="_blank" rel="noreferrer" hidden>
            打开公开文章
          </a>
          <a class="button primary" href="/admin/">返回后台</a>
        </div>
      </section>

      <article class="article">
        <header class="hero">
          <p id="preview-kicker" class="eyebrow">文章预览</p>
          <h2 id="preview-title">标题会显示在这里</h2>
          <p id="preview-meta" class="meta">作者 · 发布时间 · 标签</p>
          <p id="preview-description" class="description"></p>
          <p id="draft-note" class="draft-note" hidden>当前内容仍是草稿，仅后台可见。</p>
        </header>
        <div id="preview-content" class="content"></div>
      </article>
    </div>

    <script type="module">
      const params = new URLSearchParams(window.location.search);
      const previewId = params.get("preview");
      const previewKey = previewId ? `blog-admin:preview:${previewId}` : "";

      const emptyState = document.getElementById("empty-state");
      const previewShell = document.getElementById("preview-shell");
      const toolbarTitle = document.getElementById("toolbar-title");
      const toolbarMeta = document.getElementById("toolbar-meta");
      const publicLink = document.getElementById("public-link");
      const previewKicker = document.getElementById("preview-kicker");
      const previewTitle = document.getElementById("preview-title");
      const previewMeta = document.getElementById("preview-meta");
      const previewDescription = document.getElementById("preview-description");
      const draftNote = document.getElementById("draft-note");
      const previewContent = document.getElementById("preview-content");

      function showEmpty() {
        document.title = "预览已过期 | Qimuai Blog 后台";
        emptyState.hidden = false;
        previewShell.hidden = true;
      }

      if (!previewKey) {
        showEmpty();
      } else {
        try {
          const raw = localStorage.getItem(previewKey);
          if (!raw) {
            showEmpty();
          } else {
            const payload = JSON.parse(raw);
            document.title = `${payload.title} | 后台预览`;
            emptyState.hidden = true;
            previewShell.hidden = false;
            toolbarTitle.textContent = payload.title || "文章预览";
            toolbarMeta.textContent = payload.draft
              ? "这不是公开页面，仅供保存前确认排版。当前内容仍是草稿。"
              : "这不是公开页面，仅供保存前确认排版。";
            previewKicker.textContent = payload.kicker || "文章预览";
            previewTitle.textContent = payload.title || "未命名文章";
            previewMeta.textContent = payload.meta || "";
            previewDescription.textContent = payload.description || "";
            previewDescription.hidden = !payload.description;
            draftNote.hidden = !payload.draft;
            previewContent.innerHTML = payload.html || "<p>这里还没有正文内容。</p>";

            if (payload.publicUrl) {
              publicLink.hidden = false;
              publicLink.href = payload.publicUrl;
            } else {
              publicLink.hidden = true;
            }
          }
        } catch {
          showEmpty();
        }
      }
    </script>
  </body>
</html>
