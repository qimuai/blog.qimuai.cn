<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qimuai Blog 后台</title>
    <link rel="stylesheet" href="/admin/styles.css?v=20260324b" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <p class="eyebrow">Qimuai Blog</p>
          <h1>文章后台</h1>
          <p class="sidebar-note">直接编辑 Markdown，保存后自动推送并触发博客发布。</p>
        </div>

        <div class="toolbar">
          <button id="refresh-button" type="button" class="ghost-button">刷新列表</button>
          <button id="create-button" type="button" class="primary-button">新建草稿</button>
        </div>

        <label class="search-field">
          <span>搜索文章</span>
          <input id="search-input" type="search" placeholder="按标题或 slug 搜索" />
        </label>

        <div id="list-meta" class="list-meta">正在加载文章列表…</div>
        <div id="post-list" class="post-list" aria-live="polite"></div>
      </aside>

      <main class="editor-panel">
        <header class="editor-header">
          <div>
            <p class="eyebrow">在线编辑</p>
            <h2 id="editor-title">选择左侧文章开始编辑</h2>
            <p id="editor-meta" class="editor-meta">支持快捷键 Ctrl/Cmd + S 保存。</p>
          </div>

          <div class="editor-actions">
            <a
              id="open-post-link"
              class="ghost-link"
              href="https://blog.qimuai.cn"
              target="_blank"
              rel="noreferrer"
            >
              打开线上文章
            </a>
            <button id="save-button" type="button" class="primary-button" disabled>
              保存并发布
            </button>
          </div>
        </header>

        <div id="status-banner" class="status-banner" hidden></div>

        <section class="editor-layout">
          <section class="meta-panel">
            <article class="meta-card">
              <div class="meta-card-header">
                <div>
                  <p class="eyebrow">文章信息</p>
                  <h3>先改标题、日期、标签和摘要</h3>
                </div>
                <p class="meta-card-note">这些字段会自动写回 frontmatter，现有的其他配置项会保留。</p>
              </div>

              <div class="meta-grid">
                <label class="meta-field meta-field-full">
                  <span>标题</span>
                  <input id="meta-title" type="text" placeholder="文章标题" disabled />
                </label>

                <label class="meta-field">
                  <span>作者</span>
                  <input id="meta-author" type="text" placeholder="作者" disabled />
                </label>

                <label class="meta-field">
                  <span>发布时间</span>
                  <input
                    id="meta-pub-datetime"
                    type="text"
                    placeholder="2026-03-24T10:00:00+08:00"
                    disabled
                  />
                </label>

                <label class="meta-field meta-field-full">
                  <span>标签</span>
                  <input
                    id="meta-tags"
                    type="text"
                    placeholder="多个标签用英文逗号分隔"
                    disabled
                  />
                </label>

                <label class="meta-field meta-field-full">
                  <span>摘要</span>
                  <textarea
                    id="meta-description"
                    rows="4"
                    placeholder="给首页卡片和 SEO 用的摘要"
                    disabled
                  ></textarea>
                </label>

                <label class="meta-checkbox">
                  <input id="meta-draft" type="checkbox" disabled />
                  <span>保存为草稿</span>
                </label>

                <div class="meta-readonly">
                  <span>Slug</span>
                  <code id="meta-slug">-</code>
                </div>
              </div>
            </article>
          </section>

          <section class="body-panel">
            <label class="editor-field">
              <span>正文 Markdown</span>
              <textarea
                id="editor-textarea"
                spellcheck="false"
                placeholder="这里填写正文内容，frontmatter 会由上面的表单自动生成"
                disabled
              ></textarea>
            </label>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="/admin/app.js?v=20260324b"></script>
  </body>
</html>
